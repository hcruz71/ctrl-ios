name: CTRL
options:
  bundleIdPrefix: com.hector
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  CTRL:
    type: application
    platform: iOS
    sources:
      - path: CTRL
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hector.ctrl
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: CTRL
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "CTRL necesita acceso al micrófono para comandos de voz al asistente IA."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "CTRL usa reconocimiento de voz para convertir tus comandos en texto."
    resources:
      - path: CTRL/Resources/Assets.xcassets

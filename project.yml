name: CTRL
options:
  bundleIdPrefix: com.hector
  deploymentTarget:
    iOS: "16.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  CTRL:
    type: application
    platform: iOS
    sources:
      - path: CTRL
        excludes:
          - "**/.DS_Store"
    info:
      path: CTRL/Info.plist
      properties:
        CFBundleDisplayName: CTRL
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "CTRL usa el micrófono para que puedas organizar tus pendientes por voz"
        NSSpeechRecognitionUsageDescription: "CTRL transcribe tu voz para crear tareas, reuniones y delegaciones"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - ctrl
            CFBundleURLName: com.hector.ctrl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hector.ctrl
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        CODE_SIGN_STYLE: Automatic
    resources:
      - path: CTRL/Resources/Assets.xcassets
    dependencies:
      - target: CTRLWatch
        embed: true

  CTRLWatch:
    type: application
    platform: watchOS
    sources:
      - path: CTRLWatch
        excludes:
          - "**/.DS_Store"
    info:
      path: CTRLWatch/Info.plist
      properties:
        CFBundleDisplayName: CTRL
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.hector.ctrl
        NSMicrophoneUsageDescription: "CTRL necesita el microfono para comandos de voz"
        NSSpeechRecognitionUsageDescription: "CTRL necesita reconocimiento de voz para el asistente en tu Apple Watch"
    entitlements:
      path: CTRLWatch/CTRLWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hector.ctrl.watchkitapp
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        CODE_SIGN_STYLE: Automatic
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: 4
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    resources:
      - path: CTRLWatch/Assets.xcassets
